services:
  postgres:
    image: postgres:16-alpine
    container_name: dynamicore-postgres
    environment:
      POSTGRES_DB: dynamicore
      POSTGRES_USER: dynamicore
      POSTGRES_PASSWORD: dynamicore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/workspace/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dynamicore -d dynamicore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
